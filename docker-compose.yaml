services:
  db:
    container_name: postgres_container
    image: postgres:14.17
    ports:
      - 5000:5432
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_password
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/airflow_init.sql:/docker-entrypoint-initdb.d/airflow_init.sql
      - ./postgres/superset_init.sql:/docker-entrypoint-initdb.d/superset_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - my_network

  af:
    container_name: airflow_container
    image: apache/airflow:3.0.0
    ports:
      - 8000:8080
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@db:5432/airflow_db
      DB_HOST: db
      DB_PORT: 5432
      AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT: 600
      AIRFLOW__DAG_PROCESSOR__PROCESSOR_TIMEOUT: 600
      AIRFLOW__DAG_PROCESSOR__MIN_FILE_PROCESS_INTERVAL: 600
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./api_call:/opt/airflow/api_call
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "airflow db migrate && airflow standalone"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - my_network

  dbt:
    container_name: dbt_container
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.latest
    environment:
      DBT_PROFILES_DIR: /usr/app
    volumes:
      - ./dbt:/usr/app
    working_dir: /usr/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - my_network
    command: run

  superset:
    image: apache/superset:3.0.0-py310
    env_file:
      - path: docker/.env
        required: true
    command: ["/app/docker/docker-bootstrap.sh", "app"]
    restart: unless-stopped
    ports:
      - ${SUPERSET_PORT:-8088}:8088
    user: root
    depends_on:
      superset-init:
        condition: service_completed_successfully
    volumes:
      - ./docker:/app/docker
      - superset_data:/app/data
      - ./docker/superset_config.py:/app/pythonpath/superset_config.py
    environment:
      DATABASE_DIALECT: "postgresql+psycopg2"
      DATABASE_USER: "superset"
      DATABASE_PASSWORD: "superset"
      DATABASE_HOST: "db"
      DATABASE_PORT: "5432"
      DATABASE_DB: "superset_db"
    networks:
      - my_network

  superset-init:
    image: apache/superset:3.0.0-py310
    command: ["/app/docker/docker-init.sh"]
    env_file:
      - path: docker/.env
        required: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    user: root
    volumes:
      - ./docker:/app/docker
      - superset_data:/app/data
      - ./docker/superset_config.py:/app/superset/pythonpath/superset_config.py
    environment:
      SUPERSET_LOAD_EXAMPLES: "no"
      SUPERSET_LOG_LEVEL: "${SUPERSET_LOG_LEVEL:-info}"
      DATABASE_DIALECT: "postgresql+psycopg2"
      DATABASE_USER: "superset"
      DATABASE_PASSWORD: "superset"
      DATABASE_HOST: "db"
      DATABASE_PORT: "5432"
      DATABASE_DB: "superset_db"
    healthcheck:
      disable: true
    networks:
      - my_network

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis:/data
    networks:
      - my_network

networks:
  my_network:
    driver: bridge

volumes:
  redis:
    external: false
  superset_data:
    external: false